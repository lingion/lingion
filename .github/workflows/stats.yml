name: Update stats SVG

on:
  schedule:
    # 6 小时一次；可改成 cron 拉满
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch lingion stats from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          mkdir -p out
          python3 - <<'PY'
          import json, os, urllib.request
          tok = os.environ["GH_TOKEN"]
          req = urllib.request.Request(
              "https://api.github.com/users/lingion",
              headers={
                  "Authorization": f"Bearer {tok}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "lingion-stats-action/1.0",
              },
          )
          with urllib.request.urlopen(req, timeout=15) as r:
              data = json.load(r)
          # 拉 repos 列表（拉所有 public + 有权限看 private）
          repos_req = urllib.request.Request(
              "https://api.github.com/users/lingion/repos?per_page=100&type=all",
              headers={
                  "Authorization": f"Bearer {tok}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "lingion-stats-action/1.0",
              },
          )
          with urllib.request.urlopen(repos_req, timeout=15) as r:
              repos = json.load(r)
          with open("out/stats.json", "w") as f:
              json.dump({"user": data, "repos": repos}, f, ensure_ascii=False, indent=2)
          print("user:", data.get("login"), "public_repos:", data.get("public_repos"),
                "followers:", data.get("followers"), "repos_listed:", len(repos))
          PY

      - name: Render SVG
        run: python3 scripts/render_svg.py out/stats.json > stats.svg

      - name: Commit + push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: stats.svg
          commit_message: 'chore(stats): refresh github stats card'
